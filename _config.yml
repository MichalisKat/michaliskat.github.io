title: MySchool Tips
description: >-
  Πρακτικές οδηγίες και tips για το myschool.
baseurl: ""
url: "https://michaliskat.github.io"
lang: el

# Θέμα
theme: minima
minima:
  skin: classic

# Συγγραφέας
author: Michalis Katsirntakis

# Open Graph
logo: /assets/images/og-image.png
