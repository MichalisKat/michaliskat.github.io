<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" style="width:100%;border-radius:10px;margin-bottom:1.5rem"><rect width="400" height="200" fill="#faf5ff"/><rect x="20" y="30" width="160" height="140" rx="8" fill="white" stroke="#c4b5fd" stroke-width="2"/><rect x="20" y="30" width="160" height="22" rx="8" fill="#a78bfa"/><rect x="20" y="44" width="160" height="8" fill="#a78bfa"/><text x="100" y="47" font-family="Arial" font-size="9" fill="white" text-anchor="middle" font-weight="bold">ΑΔΕΙΑ</text><text x="30" y="72" font-family="Arial" font-size="8" fill="#6d28d9" font-weight="bold">Καταχώρηση: 1 φορά</text><text x="30" y="86" font-family="Arial" font-size="8" fill="#64748b">Από: σχολείο</text><text x="30" y="100" font-family="Arial" font-size="8" fill="#64748b">τοποθέτησης ΜΟΝΟ</text><rect x="220" y="30" width="160" height="140" rx="8" fill="white" stroke="#6ee7b7" stroke-width="2"/><rect x="220" y="30" width="160" height="22" rx="8" fill="#34d399"/><rect x="220" y="44" width="160" height="8" fill="#34d399"/><text x="300" y="47" font-family="Arial" font-size="9" fill="white" text-anchor="middle" font-weight="bold">ΑΠΟΥΣΙΑ</text><text x="230" y="72" font-family="Arial" font-size="8" fill="#065f46" font-weight="bold">Καταχώρηση: παντού!</text><text x="230" y="86" font-family="Arial" font-size="8" fill="#64748b">Από: κάθε σχολείο</text><text x="230" y="100" font-family="Arial" font-size="8" fill="#64748b">τοποθέτησης/διάθεσης</text><text x="200" y="185" font-family="Arial" font-size="9" fill="#94a3b8" text-anchor="middle">1 άδεια δεν αρκεί · χρειάζονται και οι απουσίες!</text></svg>
