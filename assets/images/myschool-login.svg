<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Φόντο -->
  <rect width="800" height="450" fill="#f0f4f8"/>

  <!-- Browser bar -->
  <rect width="800" height="40" fill="#e2e8f0"/>
  <circle cx="20" cy="20" r="6" fill="#fc8181"/>
  <circle cx="40" cy="20" r="6" fill="#f6ad55"/>
  <circle cx="60" cy="20" r="6" fill="#68d391"/>
  <rect x="100" y="10" width="500" height="20" rx="10" fill="white"/>
  <text x="350" y="24" text-anchor="middle" font-family="Arial" font-size="12" fill="#718096">myschool.sch.gr</text>

  <!-- Κεντρικό panel -->
  <rect x="250" y="80" width="300" height="320" rx="12" fill="white" stroke="#CBD5E0" stroke-width="1"/>

  <!-- Logo myschool -->
  <rect x="320" y="110" width="160" height="50" rx="8" fill="#185FA5"/>
  <text x="400" y="132" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">my</text>
  <text x="400" y="150" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">school</text>

  <!-- Τίτλος -->
  <text x="400" y="195" text-anchor="middle" font-family="Arial" font-size="14" fill="#2D3748">Σύνδεση στο σύστημα</text>

  <!-- Username field -->
  <rect x="280" y="210" width="240" height="36" rx="6" fill="white" stroke="#CBD5E0" stroke-width="1.5"/>
  <text x="295" y="233" font-family="Arial" font-size="12" fill="#A0AEC0">Όνομα χρήστη (ΠΣΔ)</text>

  <!-- Password field -->
  <rect x="280" y="258" width="240" height="36" rx="6" fill="white" stroke="#CBD5E0" stroke-width="1.5"/>
  <text x="295" y="281" font-family="Arial" font-size="12" fill="#A0AEC0">Κωδικός πρόσβασης</text>

  <!-- Button -->
  <rect x="280" y="310" width="240" height="40" rx="8" fill="#185FA5"/>
  <text x="400" y="335" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">Σύνδεση</text>

  <!-- Footer text -->
  <text x="400" y="375" text-anchor="middle" font-family="Arial" font-size="11" fill="#718096">Υπουργείο Παιδείας &amp; Θρησκευμάτων</text>
</svg>
