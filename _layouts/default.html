<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body>

    {%- include header.html -%}

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        <div class="page-layout{% unless page.sidebar != false %} page-layout--full{% endunless %}">
          <div class="page-main">
            {{ content }}
          </div>
          {%- if page.sidebar == "contact" -%}
          <aside class="page-sidebar">
            {%- include sidebar-contact.html -%}
          </aside>
          {%- elsif page.sidebar != false -%}
          <aside class="page-sidebar">
            {%- include sidebar.html -%}
          </aside>
